services:
  - type: web
    name: cling-python-api
    env: python
    region: singapore   # pilih region terdekat (singapore = Asia Tenggara)
    plan: free
    rootDir: python_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_SECRET
        generateValue: true   # Render akan auto-generate secret key
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app   # ganti dengan URL Vercel Anda
    healthCheckPath: /health
