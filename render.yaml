services:
  - type: web
    name: cling-python-api
    env: python
    region: singapore   # terdekat untuk pengguna Asia Tenggara
    plan: free
    rootDir: python_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app   # ganti dengan URL Vercel Anda
    healthCheckPath: /health
